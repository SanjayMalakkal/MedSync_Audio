services:
  backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: audiobot-backend
    volumes:
      - ./python:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    env_file:
      - ./python/.env
    restart: always

  frontend:
    build:
      context: ./React
      dockerfile: Dockerfile
      target: build
    container_name: audiobot-frontend
    volumes:
      - ./React:/app
      - /app/node_modules
    command: npm run dev -- --host --port 5173
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
